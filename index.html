<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGORAD.IO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #fcfcf5; --teal: #7ec2ad; --yellow: #e5b84a; }
        body { 
            background-color: #fcfcf5; 
            font-family: 'JetBrains Mono', monospace; 
            margin: 0; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column; 
            height: 100vh;
        }
        .font-young-serif { font-family: 'Young Serif', serif; }
        .animate-vibrate { animation: vibrate 3.5s ease-in-out infinite; }
        @keyframes vibrate { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.02); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const [hasStarted, setHasStarted] = useState(false);
            const [isPlaying, setIsPlaying] = useState(false);
            const [isAboutOpen, setIsAboutOpen] = useState(false);
            const audioRef = useRef(null);

            // Using NTS 1 as the default for stability
            const defaultStation = "https://stream-relay-geo.ntslive.net/stream";

            const togglePlay = () => {
                if (!hasStarted) {
                    setHasStarted(true);
                    setIsPlaying(true);
                } else {
                    if (isPlaying) {
                        audioRef.current.pause();
                        setIsPlaying(false);
                    } else {
                        audioRef.current.play();
                        setIsPlaying(true);
                    }
                }
            };

            return (
                <div className="flex flex-col items-center justify-between h-screen w-full p-8 text-black">
                    <audio ref={audioRef} src={defaultStation} autoPlay={hasStarted} />
                    
                    <header className="text-center">
                        <h1 className="font-young-serif text-5xl md:text-8xl uppercase tracking-tighter">
                            ALGORAD.<span style={{color: '#e5b84a'}}>I</span><span style={{color: '#7ec2ad'}}>O</span>
                        </h1>
                    </header>

                    <main className="flex items-center justify-center">
                        <button 
                            onClick={togglePlay}
                            className={`w-48 h-48 rounded-full shadow-2xl flex items-center justify-center transition-transform active:scale-95 ${isPlaying ? 'animate-vibrate' : ''}`}
                            style={{ backgroundColor: '#7ec2ad' }}
                        >
                            <span className="font-bold uppercase tracking-widest">
                                {!hasStarted ? 'Power On' : isPlaying ? 'Pause' : 'Play'}
                            </span>
                        </button>
                    </main>

                    <footer className="flex gap-10">
                        <button onClick={() => setIsAboutOpen(true)} className="uppercase font-black text-xs tracking-widest opacity-50 hover:opacity-100">About</button>
                    </footer >

                    {isAboutOpen && (
                        <div className="fixed inset-0 bg-white/95 z-50 p-10 overflow-y-auto">
                            <button onClick={() => setIsAboutOpen(false)} className="absolute top-10 right-10 font-bold">CLOSE [X]</button>
                            <div className="max-w-2xl mx-auto space-y-6">
                                <h2 className="font-young-serif text-4xl uppercase">The Manifesto</h2>
                                <p>Most modern algorithms are designed to keep you addicted to a screen, trapping you in an echo chamber while creators are left behind. ALGORAD.IO uses that technology for something better[cite: 120, 126].</p>
                                <p>I was an original DJ at NTS Radio, hosting the Synth Hero Show from the station's launch. This project was co-coded with Gemini to highlight human curation[cite: 119, 121].</p>
                                <p className="font-bold pt-4">– Tim Noakes [cite: 123]</p>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
