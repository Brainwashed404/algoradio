<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGORAD.IO | Internet Radio</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Young+Serif&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg: #fcfcf5;
            --teal: #7ec2ad;
            --yellow: #e5b84a;
            --black: #000000;
        }

        body {
            font-family: 'JetBrains Mono', monospace;
            background-color: var(--bg);
            color: var(--black);
            margin: 0;
            overflow: hidden;
            height: 100vh;
        }

        .font-young-serif { font-family: 'Young Serif', serif; }

        /* Smooth UI Transitions */
        .overlay-backdrop {
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            background-color: rgba(252, 252, 245, 0.9);
        }

        /* The "Coin" Animation */
        .coin-container { perspective: 1200px; }
        
        @keyframes vibrate {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02) translateY(-2px); }
        }
        .is-vibrating { animation: vibrate 3.5s ease-in-out infinite; }

        /* Animations for transitions */
        .animate-flip-y { animation: flip-y 0.9s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes flip-y { from { transform: rotateY(0deg); } to { transform: rotateY(360deg); } }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* Grainy Texture */
        .grain {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 50;
            opacity: 0.04;
            background-image: url('https://grainy-gradients.vercel.app/noise.svg');
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // Reuse your Icon helper for Lucide
        const Icon = ({ name, size = 24, fill = "none", strokeWidth = 2, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        attrs: { width: size, height: size, fill, 'stroke-width': strokeWidth }
                    });
                }
            }, [name, size, fill, strokeWidth]);
            return <span ref={iconRef} className={`inline-flex items-center justify-center ${className}`} />;
        };

        // --- DATA (Shortened for preview, but keep your full list in your final file) ---
        const MOODS = [
            { emoji: "🤪", label: "Pumped" }, { emoji: "😴", label: "Low-energy" }, 
            { emoji: "😎", label: "Confident" }, { emoji: "☀️", label: "Clear" },
            { emoji: "☔️", label: "Rainy" }, { emoji: "🤯", label: "Weird" }
        ];

        const STATIONS = [
            { name: "NTS Slow Focus", url: "https://stream-mixtape-geo.ntslive.net/mixtape", desc: "Meditative and beatless ambient.", genre: "Ambient", moods: ["😴"] },
            { name: "SomaFM Groove Salad", url: "https://ice.somafm.com/groovesalad", desc: "Chilled downtempo beats.", genre: "Ambient", moods: ["😴", "☀️"] },
            { name: "UKG Radio", url: "https://streams.radio.co/s9549b306a/listen", desc: "Authentic London garage.", genre: "Electronic", moods: ["🤪"] },
            { name: "NTS Island Time", url: "https://stream-mixtape-geo.ntslive.net/mixtape21", desc: "Reggae and rocksteady.", genre: "Dub", moods: ["😎", "☀️"] }
        ];

        const App = () => {
            const [isPlaying, setIsPlaying] = useState(false);
            const [currentStation, setCurrentStation] = useState(STATIONS[0]);
            const [hasStarted, setHasStarted] = useState(false);
            const audioRef = useRef(null);

            const togglePlay = () => {
                if (!hasStarted) {
                    setHasStarted(true);
                    audioRef.current.src = currentStation.url;
                }
                if (isPlaying) {
                    audioRef.current.pause();
                } else {
                    audioRef.current.play();
                }
                setIsPlaying(!isPlaying);
            };

            return (
                <div className="fixed inset-0 flex flex-col items-center justify-between p-8">
                    <div className="grain" />
                    <audio ref={audioRef} />

                    {/* Header */}
                    <header className="text-center z-10">
                        <h1 className="font-young-serif text-6xl md:text-8xl uppercase tracking-tighter">
                            ALGORAD.<span style={{color: 'var(--yellow)'}}>I</span><span style={{color: 'var(--teal)'}}>O</span>
                        </h1>
                        {hasStarted && (
                            <div className="mt-4 animate-in fade-in">
                                <p className="text-2xl font-young-serif uppercase tracking-tight">{currentStation.name}</p>
                                <p className="text-xs opacity-50 uppercase tracking-widest mt-1">{currentStation.desc}</p>
                            </div>
                        )}
                    </header>

                    {/* Middle: The Big Button */}
                    <main className="flex items-center justify-center z-10">
                        <button 
                            onClick={togglePlay}
                            className={`w-48 h-48 rounded-full shadow-2xl transition-all active:scale-95 flex items-center justify-center ${isPlaying ? 'is-vibrating' : ''}`}
                            style={{ backgroundColor: 'var(--teal)', border: '8px solid var(--black)' }}
                        >
                            <div className="w-32 h-32 rounded-full bg-black flex items-center justify-center text-[#fcfcf5]">
                                {isPlaying ? <Icon name="pause" size={48} fill="currentColor" /> : <Icon name="play" size={48} className="ml-2" fill="currentColor" />}
                            </div>
                        </button>
                    </main>

                    {/* Footer */}
                    <footer className="w-full max-w-2xl flex justify-around items-center z-10 pb-8">
                        <button className="flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition-opacity">
                            <Icon name="shuffle" />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Shuffle</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition-opacity">
                            <Icon name="smile" />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Vibe</span>
                        </button>
                        <button className="flex flex-col items-center gap-1 opacity-40 hover:opacity-100 transition-opacity">
                            <Icon name="list" />
                            <span className="text-[10px] font-bold uppercase tracking-widest">Index</span>
                        </button>
                    </footer>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
