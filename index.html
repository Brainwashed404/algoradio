            { name: "LYL Radio", url: "https://icecast.lyl.live/live", sourceUrl: "https://lyl.live", desc: "Cultural project promoting sound exploration.", genre: "Eclectic", moods: ["🧐"] },
            { name: "Soho Radio", url: "https://sohoradiomusic.doughunt.co.uk:8010/128mp3", sourceUrl: "https://www.sohoradiolondon.com", desc: "Grass-roots amplifier for music and culture.", genre: "Eclectic", moods: ["☀️"] },
            { name: "WFMU", url: "https://stream0.wfmu.org/freeform-128k.mp3", sourceUrl: "https://wfmu.org", desc: "Freeform radio featuring flat-out uncategorisable strangeness.", genre: "Eclectic", moods: ["🧐", "☔️"] },
            { name: "WFMU - Give the Drummer Radio", url: "https://stream0.wfmu.org/drummer.mp3", sourceUrl: "https://wfmu.org/drummer", desc: "Freeform web stream curated by WFMU's long-running show.", genre: "Eclectic", moods: ["🧐"] }
        ];

        const SORTED_STATIONS = [...STATIONS].sort((a, b) => {
            const nameA = a.sortName || a.name;
            const nameB = b.sortName || b.name;
            return nameA.localeCompare(nameB, 'en', { numeric: true, sensitivity: 'base' });
        });

        const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
        };

        const App = () => {
            const [currentStation, setCurrentStation] = useState(null);
            const [displayedName, setDisplayedName] = useState("");
            const [displayedDesc, setDisplayedDesc] = useState("");
            const [isPlaying, setIsPlaying] = useState(false);
            const [isMuted, setIsMuted] = useState(false);
            const [hasStarted, setHasStarted] = useState(false); 
            const [isLoading, setIsLoading] = useState(false);
            const [isIndexOpen, setIsIndexOpen] = useState(false);
            const [isGenreOpen, setIsGenreOpen] = useState(false);
            const [isMoodOpen, setIsMoodOpen] = useState(false);
            const [isAboutOpen, setIsAboutOpen] = useState(false);
            const [selectedGenre, setSelectedGenre] = useState("All");
            const [selectedMood, setSelectedMood] = useState("All");
            const [isShuffleMode, setIsShuffleMode] = useState(false);
            const [flipState, setFlipState] = useState(null);
            const [error, setError] = useState(null);
            
            const [shuffleSequence, setShuffleSequence] = useState([]);
            const [shufflePointer, setShufflePointer] = useState(-1);

            const audioContextRef = useRef(null);
            const audioTagRef = useRef(null);
            const playTimeoutRef = useRef(null);
            const metadataIntervalRef = useRef(null);
            const flipTimeoutRef = useRef(null);
            const stationRefs = useRef(new Map());

            const colors = { bg: '#fcfcf5', teal: '#7ec2ad', tealDark: '#4a8b78', yellow: '#e5b84a', black: '#000000' };

            const filteredStations = useMemo(() => {
                return SORTED_STATIONS.filter(s => {
                    const genreMatch = selectedGenre === "All" || s.genre === selectedGenre;
                    const moodMatch = selectedMood === "All" || s.moods?.includes(selectedMood);
                    return genreMatch && moodMatch;
                });
            }, [selectedGenre, selectedMood]);

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setIsGenreOpen(false); setIsMoodOpen(false);
                        setIsIndexOpen(false); setIsAboutOpen(false);
                        return;
                    }
                    if (isIndexOpen) {
                        const key = e.key.toLowerCase();
                        if (key.length === 1 && /[a-z0-9]/.test(key)) {
                            const target = filteredStations.find(s => 
                                s.name.toLowerCase().startsWith(key) || 
                                (s.sortName && s.sortName.toLowerCase().startsWith(key))
                            );
                            if (target) {
                                const el = stationRefs.current.get(target.name);
                                if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); return; }
                            }
                        }
                    }
                    if (!hasStarted) return;
                    if (e.key === 'ArrowRight') { handleNext(); }
                    else if (e.key === 'ArrowLeft') { handlePrevious(); }
                    else if (e.code === 'Space' || e.key === ' ') {
                        e.preventDefault();
                        setIsMuted(prev => !prev);
                        triggerFlip(isShuffleMode ? 'x' : 'y');
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [hasStarted, currentStation, isShuffleMode, isPlaying, filteredStations, isIndexOpen, shuffleSequence, shufflePointer]);

            useEffect(() => {
                if (isShuffleMode) {
                    const newSequence = shuffleArray(filteredStations);
                    setShuffleSequence(newSequence);
                    setShufflePointer(0);
                    if (newSequence.length > 0 && hasStarted) setCurrentStation(newSequence[0]);
                }
            }, [filteredStations, isShuffleMode]);

            useEffect(() => {
                const startStation = SORTED_STATIONS[Math.floor(Math.random() * SORTED_STATIONS.length)];
                setCurrentStation(startStation);
                setDisplayedName(startStation.name);
            }, []);

            const triggerFlip = (type) => {
                if (flipTimeoutRef.current) clearTimeout(flipTimeoutRef.current);
                setFlipState(null);
                requestAnimationFrame(() => {
                    setFlipState(type);
                    flipTimeoutRef.current = setTimeout(() => setFlipState(null), 900);
                });
            };

            const fetchMetadata = async (station) => {
                if (!station) return;
                if (station.apiId) {
                    try {
                        const response = await fetch('https://www.nts.live/api/v2/live', { cache: 'no-store' });
                        const data = await response.json();
                        const channelData = data.results.find(res => res.channel_name === station.apiId);
                        if (channelData && channelData.now) return channelData.now.embed_title || station.desc;
                    } catch (err) { console.warn("Metadata sync pending."); }
                }
                return station.desc || "Continuous Broadcast";
            };

            useEffect(() => {
                if (!hasStarted || !currentStation) return;
                setError(null);
                setIsLoading(true);
                if (playTimeoutRef.current) clearTimeout(playTimeoutRef.current);
                playTimeoutRef.current = setTimeout(() => connectToStream(currentStation.url), 200);
                if (metadataIntervalRef.current) clearInterval(metadataIntervalRef.current);
                metadataIntervalRef.current = setInterval(async () => {
                    const meta = await fetchMetadata(currentStation);
                    if (!isLoading) setDisplayedDesc(meta);
                }, 60000);
                return () => clearInterval(metadataIntervalRef.current);
            }, [currentStation, hasStarted]);

            const initAudio = () => {
                if (!audioContextRef.current) {
                    audioContextRef.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioContextRef.current.state === 'suspended') audioContextRef.current.resume();
                setHasStarted(true);
                setIsPlaying(true);
            };

            const connectToStream = (url) => {
                if (!audioTagRef.current) return;
                setIsLoading(true);
                setError(null);
                audioTagRef.current.pause();
                audioTagRef.current.src = "";
                audioTagRef.current.load();
                audioTagRef.current.src = url;
                audioTagRef.current.play()
                    .then(async () => {
                        setIsLoading(false);
                        setIsPlaying(true);
                        setDisplayedName(currentStation.name);
                        const meta = await fetchMetadata(currentStation);
                        setDisplayedDesc(meta);
                    })
                    .catch(err => {
                        if (err.name !== 'AbortError') {
                            setError("Signal Lost");
                            setIsLoading(false);
                            setIsPlaying(false);
                        }
                    });
            };

            const togglePlay = () => {
                triggerFlip(isShuffleMode ? 'x' : 'y');
                if (!hasStarted) { initAudio(); return; }
                if (isPlaying) { audioTagRef.current.pause(); setIsPlaying(false); }
                else {
                    audioTagRef.current.play()
                        .then(() => setIsPlaying(true))
                        .catch(() => connectToStream(currentStation.url));
                }
            };

            const handleNext = () => {
                triggerFlip(isShuffleMode ? 'x' : 'y');
                if (filteredStations.length === 0) return;
                if (isShuffleMode) {
                    const nextPointer = (shufflePointer + 1) % shuffleSequence.length;
                    setShufflePointer(nextPointer);
                    setCurrentStation(shuffleSequence[nextPointer]);
                } else {
                    const currentIndex = filteredStations.findIndex(s => s.url === currentStation.url);
                    const nextIndex = (currentIndex + 1) % filteredStations.length;
                    setCurrentStation(filteredStations[nextIndex]);
                }
            };

            const handlePrevious = () => {
                triggerFlip(isShuffleMode ? 'x-reverse' : 'y-reverse');
                if (filteredStations.length === 0) return;
                if (isShuffleMode) {
                    const prevPointer = (shufflePointer - 1 + shuffleSequence.length) % shuffleSequence.length;
                    setShufflePointer(prevPointer);
                    setCurrentStation(shuffleSequence[prevPointer]);
                } else {
                    const currentIndex = filteredStations.findIndex(s => s.url === currentStation.url);
                    const prevIndex = (currentIndex - 1 + filteredStations.length) % filteredStations.length;
                    setCurrentStation(filteredStations[prevIndex]);
                }
            };

            const handleShuffleToggle = () => {
                triggerFlip('x');
                const targetShuffle = !isShuffleMode;
                setIsShuffleMode(targetShuffle);
                if (targetShuffle) {
                    const sequence = shuffleArray(filteredStations);
                    setShuffleSequence(sequence);
                    setShufflePointer(0);
                    setCurrentStation(sequence[0]);
                }
            };

            const handleStationSelect = (station) => {
                if (!hasStarted) initAudio();
                setCurrentStation(station);
                setIsIndexOpen(false);
            };

            const handleGenreSelect = (genre) => {
                triggerFlip('y');
                setSelectedGenre(genre);
                setIsGenreOpen(false);
                const pool = STATIONS.filter(s => (genre === "All" || s.genre === genre) && (selectedMood === "All" || s.moods?.includes(selectedMood)));
                if (pool.length > 0) {
                    const randomStation = pool[Math.floor(Math.random() * pool.length)];
                    setCurrentStation(randomStation);
                    if (!hasStarted) initAudio();
                }
            };

            const handleMoodSelect = (moodEmoji) => {
                triggerFlip('y');
                setSelectedMood(moodEmoji);
                setIsMoodOpen(false);
                const pool = STATIONS.filter(s => (moodEmoji === "All" || s.moods?.includes(moodEmoji)) && (selectedGenre === "All" || s.genre === selectedGenre));
                if (pool.length > 0) {
                    const randomStation = pool[Math.floor(Math.random() * pool.length)];
                    setCurrentStation(randomStation);
                    if (!hasStarted) initAudio();
                }
            };

            const handleMainMoodToggle = () => {
                if (selectedMood !== "All") {
                    setSelectedMood("All");
                    triggerFlip('y');
                } else {
                    setIsMoodOpen(true);
                }
            };

            const handleMainGenreToggle = () => {
                if (selectedGenre !== "All") {
                    setSelectedGenre("All");
                    triggerFlip('y');
                } else {
                    setIsGenreOpen(true);
                }
            };

            const getTitleFontSize = (name) => {
                if (!name) return 'text-6xl sm:text-7xl md:text-8xl';
                const len = name.length;
                if (len > 25) return 'text-3xl sm:text-4xl md:text-4xl'; 
                if (len > 18) return 'text-4xl sm:text-5xl md:text-5xl';
                if (len > 12) return 'text-5xl sm:text-7xl md:text-6xl';
                return 'text-5xl sm:text-7xl md:text-8xl';
            };

            const JotterLogoButton = () => {
                const animationClass = flipState === 'y' ? 'animate-flip-y' : 
                                      flipState === 'y-reverse' ? 'animate-flip-y-reverse' :
                                      flipState === 'x' ? 'animate-flip-x' :
                                      flipState === 'x-reverse' ? 'animate-flip-x-reverse' : '';
                return (
                    <div className="coin-container">
                        <button
                            onClick={togglePlay}
                            className={`relative group transition-all duration-500 active:scale-95 flex-shrink-0 touch-manipulation block bg-transparent outline-none
                                ${isPlaying && !isMuted ? 'animate-vibrate' : ''} 
                                ${animationClass}`}
                            style={{ 
                                width: '180px', height: '180px',
                                transformStyle: 'preserve-3d',
                                transform: isMuted ? 'translateZ(-100px)' : 'translateZ(0px)',
                                filter: isMuted ? 'grayscale(1) brightness(0.9) contrast(0.9)' : 'none',
                                transition: 'transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1), filter 0.8s ease'
                            }}
                        >
                            {[...Array(12)].map((_, i) => (
                                <div key={i} className="absolute inset-0 rounded-full border border-black/5 shadow-inner" 
                                     style={{ backgroundColor: colors.teal, transform: `translateZ(${(i - 6) * 1.2}px)`, backfaceVisibility: 'visible' }} />
                            ))}
                            <div className="absolute inset-0 rounded-full flex items-center justify-center overflow-hidden" 
                                 style={{ backgroundColor: colors.teal, transform: 'translateZ(7px)', backfaceVisibility: 'hidden' }}>
                                <div className="absolute inset-[9%] rounded-full shadow-inner" style={{ backgroundColor: colors.yellow }} />
                                <div className="absolute inset-[22.5%] rounded-full flex items-center justify-center shadow-2xl" style={{ backgroundColor: colors.black }}>
                                    <div className={`text-[#fcfcf5] transition-opacity duration-300 ${!hasStarted ? 'opacity-80' : 'opacity-0 group-hover:opacity-40'}`}>
                                        {!hasStarted ? <Icon name="power" size="32" /> : isPlaying ? <Icon name="pause" size="40" fill="currentColor" /> : <Icon name="play" size="40" fill="currentColor" className="translate-x-1" />}
                                    </div>
                                </div>
                            </div>
                            <div className="absolute inset-0 rounded-full" style={{ backgroundColor: colors.yellow, transform: 'translateZ(-7px) rotateY(180deg)', backfaceVisibility: 'hidden' }} />
                        </button>
                    </div>
                );
            };

            return (
                <div className="fixed inset-0 flex flex-col items-center select-none transition-colors duration-500 overflow-hidden touch-none" style={{ backgroundColor: colors.bg }}>
                    <audio ref={audioTagRef} muted={isMuted} />
                    <div className="fixed inset-0 pointer-events-none z-50 opacity-[0.03] grayscale bg-[url('https://grainy-gradients.vercel.app/noise.svg')]" />

                    <header className="w-full h-[25vh] flex flex-col items-center justify-center text-center px-4 pt-16 flex-shrink-0 z-10">
                        {!hasStarted ? (
                            <h2 className="font-young-serif text-6xl sm:text-7xl md:text-8xl font-black tracking-tighter animate-in fade-in duration-1000 uppercase" style={{ color: colors.black }}>
                                <span className="block sm:inline">ALGORAD.<span style={{ color: colors.yellow }}>I</span><span style={{ color: colors.teal }}>O</span></span>
                            </h2>
                        ) : (
                            <div className="w-full flex flex-col items-center">
                                {error ? (
                                    <div className="flex flex-col items-center justify-center space-y-2 uppercase tracking-widest font-black" style={{ color: colors.black }}>
                                        <Icon name="alert-circle" size="32" />
                                        <span className="text-lg md:text-xl uppercase">Signal Lost</span>
                                    </div>
                                ) : (
                                    <div className="flex flex-col items-center justify-center w-full">
                                        <h2 className={`font-young-serif tracking-tighter leading-[0.85] sm:leading-tight uppercase transition-all duration-1000 ease-in-out ${getTitleFontSize(displayedName)} ${isLoading ? 'opacity-0 blur-lg' : 'opacity-100'}`} style={{ color: colors.black, textWrap: 'balance' }}>{displayedName}</h2>
                                        <div className={`mt-2 px-6 transition-all duration-1000 ease-in-out ${isLoading ? 'opacity-0 blur-md' : 'opacity-40'}`}>
                                            <p className="text-[10px] sm:text-xs md:text-sm uppercase tracking-[0.18em] font-bold max-w-xl leading-relaxed mx-auto" style={{ color: colors.black }}>{displayedDesc}</p>
                                        </div>
                                    </div>
                                )}
                            </div>
                        )}
                    </header>

                    <main className="flex-grow flex items-center justify-center w-full space-x-6 sm:space-x-12 md:space-x-20 z-10">
                        {hasStarted && <button onClick={handlePrevious} className="p-2 outline-none transition-all hover:scale-110 active:scale-90 text-black/40 hover:text-black" aria-label="Previous station"><Icon name="skip-back" size="48" strokeWidth={0} fill="currentColor" /></button>}
                        <JotterLogoButton />
                        {hasStarted && <button onClick={handleNext} className="p-2 outline-none transition-all hover:scale-110 active:scale-90 text-black/40 hover:text-black" aria-label="Next station"><Icon name="skip-forward" size="48" strokeWidth={0} fill="currentColor" /></button>}
                    </main>

                    <footer className="w-full h-[25vh] flex flex-col items-center justify-center pb-8 flex-shrink-0 z-10">
                        {!hasStarted ? (
                            <p className="text-[10px] sm:text-xs uppercase tracking-[0.25em] font-black animate-in fade-in duration-1000" style={{ color: colors.teal }}>created by <a href="https://www.jotter.media" target="_blank" rel="noopener noreferrer" className="hover:text-black transition-colors outline-none">jotter.media</a></p>
                        ) : (
                            <div className="flex items-center justify-center gap-4 sm:gap-8">
                                <FooterBtn icon={isMuted ? "volume-x" : "volume-2"} label="Mute" onClick={() => { setIsMuted(!isMuted); triggerFlip('y'); }} active={isMuted} />
                                <FooterBtn icon="shuffle" label="Shuffle" onClick={handleShuffleToggle} active={isShuffleMode} />
                                <FooterBtn label="Vibe" onClick={handleMainMoodToggle} active={selectedMood !== "All"} text={selectedMood !== "All" ? selectedMood : ""} icon={selectedMood !== "All" ? "" : "smile"} />
                                <FooterBtn 
                                    label="Genre" 
                                    onClick={handleMainGenreToggle} 
                                    active={selectedGenre !== "All"} 
                                    text={selectedGenre !== "All" ? GENRE_EMOJIS[selectedGenre] : ""}
                                    icon={selectedGenre !== "All" ? "" : "music"} 
                                />
                                <FooterBtn icon="list" label="Index" onClick={() => setIsIndexOpen(true)} />
                                <FooterBtn icon="info" label="About" onClick={() => setIsAboutOpen(true)} />
                            </div>
                        )}
                    </footer>

                    {isMoodOpen && <MoodOverlay onSelect={handleMoodSelect} onClose={() => setIsMoodOpen(false)} selected={selectedMood} />}
                    {isGenreOpen && <GenreOverlay onSelect={handleGenreSelect} onClose={() => setIsGenreOpen(false)} selected={selectedGenre} colors={colors} />}
                    {isIndexOpen && <IndexOverlay current={currentStation} onSelect={handleStationSelect} onClose={() => setIsIndexOpen(false)} stations={filteredStations} refs={stationRefs} />}
                    {isAboutOpen && <AboutOverlay onClose={() => setIsAboutOpen(false)} colors={colors} />}
                </div>
            );
        };

        const FooterBtn = ({ icon, label, onClick, active, text }) => (
            <div className="flex flex-col items-center group">
                <button onClick={onClick} className={`w-14 h-14 rounded-3xl border border-black/10 flex items-center justify-center transition-all hover:scale-110 active:scale-90 text-xl outline-none`} 
                    style={{ backgroundColor: active ? '#000' : 'transparent', color: active ? '#fcfcf5' : '#000' }}>
                    {text ? <span className="leading-none text-2xl">{text}</span> : (icon ? <Icon name={icon} size="22" strokeWidth={2} fill="none" /> : null)}
                </button>
                <span className="text-[9px] font-black tracking-widest mt-2 opacity-0 group-hover:opacity-100 transition-opacity uppercase text-center">{label}</span>
            </div>
        );

        const MoodOverlay = ({ onSelect, onClose, selected }) => (
            <div className="fixed inset-0 z-[100] flex flex-col animate-overlay-in backdrop-blur-2xl bg-white/80">
                <button onClick={onClose} className="absolute top-6 right-6 p-2 transition-transform hover:rotate-90 text-black outline-none"><Icon name="x" size="32" /></button>
                <div className="flex-grow overflow-y-auto px-6 pt-16 pb-12 custom-scrollbar">
                    <div className="max-w-xl mx-auto flex flex-col items-center">
                        <h4 className="font-young-serif text-3xl sm:text-4xl font-black tracking-tight mb-8 text-center uppercase text-black">Vibe check</h4>
                        <div className="grid grid-cols-3 gap-4 sm:gap-6 max-w-sm w-full">
                            {MOODS.map((mood, idx) => (
                                <button key={mood.emoji} onClick={() => onSelect(mood.emoji)} className={`aspect-square flex items-center justify-center text-3xl sm:text-4xl rounded-[1.5rem] border transition-all hover:scale-110 active:scale-95 animate-brand-kinetic outline-none ${selected === mood.emoji ? 'border-black bg-black' : 'border-black/5 bg-white shadow-sm'}`} style={{ animationDelay: `${idx * 40}ms` }}>{mood.emoji}</button>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const GenreOverlay = ({ onSelect, onClose, selected }) => (
            <div className="fixed inset-0 z-[100] flex flex-col animate-overlay-in backdrop-blur-2xl bg-white/80 text-black">
                <button onClick={onClose} className="absolute top-6 right-6 p-2 transition-transform hover:rotate-90 outline-none"><Icon name="x" size="32" /></button>
                <div className="flex-grow overflow-y-auto px-4 pt-16 pb-8 custom-scrollbar">
                    <div className="max-w-2xl mx-auto flex flex-col items-center">
                        <h4 className="font-young-serif text-3xl sm:text-4xl font-black tracking-tight mb-6 text-center uppercase">Genre</h4>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 w-full">
                            {GENRES.map((genre, idx) => (
                                <button key={genre} onClick={() => onSelect(genre)} 
                                    className="flex items-center justify-between px-5 py-2.5 rounded-[1.2rem] border transition-all hover:scale-[1.03] animate-brand-kinetic shadow-sm outline-none" 
                                    style={{ 
                                        borderColor: selected === genre ? '#000' : 'rgba(0,0,0,0.05)', 
                                        backgroundColor: selected === genre ? '#000' : 'white', 
                                        color: selected === genre ? '#fcfcf5' : '#4a8b78', 
                                        animationDelay: `${idx * 40}ms` 
                                    }}>
                                    <span className="font-young-serif text-base sm:text-lg font-black uppercase tracking-tight truncate mr-2">{genre}</span>
                                    {selected === genre && <Icon name="check" size="20" strokeWidth={3} />}
                                </button>
                            ))}
                        </div>
                    </div>
                </div>
            </div>
        );

        const IndexOverlay = ({ current, onSelect, onClose, stations, refs }) => {
            useEffect(() => {
                if (current) {
                    const activeElement = refs.current.get(current.name);
                    if (activeElement) {
                        activeElement.scrollIntoView({ behavior: 'smooth', block: 'center' });
                    }
                }
            }, [current]);

            return (
                <div className="fixed inset-0 z-[100] flex flex-col animate-overlay-in backdrop-blur-3xl bg-white/90 text-black">
                    <button onClick={onClose} className="absolute top-6 right-6 p-2 transition-transform hover:rotate-90 z-[110] outline-none bg-white/50 backdrop-blur rounded-full shadow-sm"><Icon name="x" size="32" /></button>
                    <div className="flex-grow overflow-y-auto p-4 custom-scrollbar scroll-smooth pt-20">
                        <div className="max-w-3xl mx-auto flex flex-col">
                            <h3 className="font-young-serif text-xl sm:text-3xl font-black mb-8 px-6 uppercase text-center">Station index</h3>
                            {stations.map((station) => (
                                <div key={station.name} ref={el => { if (el) refs.current.set(station.name, el); }} className="w-full transition-all border-b border-black/[0.03] last:border-0 flex items-stretch hover:bg-black/[0.02]" style={{ backgroundColor: current?.name === station.name ? 'rgba(0,0,0,0.05)' : 'transparent' }}>
                                    <button onClick={() => onSelect(station)} className="flex-grow text-left py-5 px-6 outline-none group flex items-center justify-between">
                                        <div className="flex flex-col">
                                            <span className={`font-young-serif text-xl sm:text-2xl font-black tracking-tighter ${current?.name === station.name ? 'text-black' : 'text-[#7ec2ad]'} uppercase`}>{station.name}</span>
                                            <span className="text-[9px] uppercase tracking-widest font-black opacity-40 mt-0.5">{station.desc.split('.')[0]}</span>
                                        </div>
                                        {current?.name === station.name && <div className="w-3.5 h-3.5 rounded-full animate-pulse bg-[#e5b84a]" />}
                                    </button>
                                    <a href={station.sourceUrl} target="_blank" rel="noopener noreferrer" className="px-8 flex items-center justify-center opacity-20 hover:opacity-100 transition-opacity outline-none"><Icon name="external-link" size="18" /></a>
                                </div>
                            ))}
                        </div>
